<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  color: white;
}

/* Card Design */
.container {
  background: rgba(255,255,255,0.15);
  padding: 20px;
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Heading */
h1 {
  font-size: 2.5em;
}

/* Image */
img {
  width: 200px;
  border-radius: 50%;
  border: 5px solid white;
  margin: 20px 0;
}

/* Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4b7d;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ffe4ec;
}

/* Message */
#message {
  margin-top: 15px;
  font-size: 18px;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: pink;
  font-size: 20px;
  animation: float 5s linear infinite;
}

@keyframes float {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>🎉 Happy Birthday Shivansh 🎂</h1>

  <img src="photo.jpg">

  <p id="message">Click below for surprise 💖</p>

  <button onclick="showWish()">🎁 Click Me</button>
</div>

<script>
function showWish() {
  document.getElementById("message").innerText =
  "💖 Wishing you happiness, success & lots of love! 🎈✨";
}

/* Hearts Animation */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random()*20) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
